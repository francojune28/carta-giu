<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carta</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:black;
overflow:hidden;
height:100vh;
}

/* INTRO */

#intro{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
}

#cover{
max-width:95vw;
max-height:85vh;
object-fit:contain;
border-radius:10px;
}

/* BOTON ABRIR */

#openBtn{
margin-top:30px;
padding:14px 32px;
border-radius:40px;
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
backdrop-filter:blur(10px);
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

#openBtn:hover{
transform:scale(1.1);
}

/* PARTICULAS */

.particles{
position:absolute;
inset:0;
pointer-events:none;
}

.particle{
position:absolute;
width:4px;
height:4px;
background:#ffd979;
border-radius:50%;
opacity:0;
animation:float 6s infinite;
}

@keyframes float{
0%{transform:translateY(30px);opacity:0}
50%{opacity:1}
100%{transform:translateY(-60px);opacity:0}
}

/* LIBRO */

#book{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
}

/* PAGINAS */

.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:url("fondo.jpg") center/cover no-repeat;
opacity:0;
transition:opacity .6s;
}

.page.active{
opacity:1;
}

/* CONTENIDO */

.content{
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:12px;
backdrop-filter:blur(10px);
color:white;
text-align:center;
max-width:80%;
}

/* BOTONES PAGINAS */

.controls{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 25px;
box-sizing:border-box;
}

.btn{
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:24px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* BOTON MUSICA */

#musicBtn{
position:absolute;
top:20px;
right:20px;
width:45px;
height:45px;
border-radius:50%;
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<!-- INTRO -->

<div id="intro">

<img id="cover" src="carta.jpg">

<div class="particles" id="particlesIntro"></div>

<button id="openBtn">Abrir carta</button>

</div>

<!-- LIBRO -->

<div id="book">

<div id="musicBtn">🔇</div>

<div class="page active">

<div class="particles"></div>

<div class="content">

<h2>Para ti</h2>

<p>Hoy quiero recordarte lo especial que eres.</p>

</div>

</div>

<div class="page">

<div class="particles"></div>

<div class="content">

<h2>Tu sonrisa</h2>

<p>Tu sonrisa tiene esa magia que ilumina cualquier momento.</p>

</div>

</div>

<div class="page">

<div class="particles"></div>

<div class="content">

<h2>Feliz día</h2>

<p>Feliz día de la mujer mi Giu 💛</p>

</div>

</div>

<div class="controls">

<div class="btn" id="prevBtn">❮</div>
<div class="btn" id="nextBtn">❯</div>

</div>

</div>

<audio id="music" preload="auto" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

/* PARTICULAS */

function createParticles(container){

for(let i=0;i<30;i++){

let p=document.createElement("div")
p.className="particle"

p.style.left=Math.random()*100+"%"
p.style.top=Math.random()*100+"%"
p.style.animationDelay=Math.random()*6+"s"

container.appendChild(p)

}

}

createParticles(document.getElementById("particlesIntro"))

document.querySelectorAll(".particles").forEach(p=>{
createParticles(p)
})

/* ABRIR LIBRO */

const intro=document.getElementById("intro")
const book=document.getElementById("book")

document.getElementById("openBtn").addEventListener("click",()=>{

intro.style.display="none"
book.style.display="flex"

})

/* PAGINAS */

let page=0
const pages=document.querySelectorAll(".page")

function showPage(){

pages.forEach(p=>p.classList.remove("active"))
pages[page].classList.add("active")

}

document.getElementById("nextBtn").addEventListener("click",()=>{

if(page < pages.length-1){
page++
showPage()
}

})

document.getElementById("prevBtn").addEventListener("click",()=>{

if(page>0){
page--
showPage()
}

})

/* SWIPE MOVIL */

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50) document.getElementById("nextBtn").click()
if(endX-startX>50) document.getElementById("prevBtn").click()

})

/* MUSICA */

const music=document.getElementById("music")
const musicBtn=document.getElementById("musicBtn")

let started=false

musicBtn.addEventListener("click",()=>{

if(!started){

music.volume=0.7
music.play().then(()=>{

started=true
musicBtn.textContent="🔊"

})

return

}

if(music.paused){

music.play()
musicBtn.textContent="🔊"

}else{

music.pause()
musicBtn.textContent="🔇"

}

})

</script>

</body>
</html>
