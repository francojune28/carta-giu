<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carta</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:black;
overflow:hidden;
height:100vh;
}

/* BOTON MUSICA */

#musicBtn{
position:fixed;
top:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
cursor:pointer;
z-index:10;
}

/* INTRO */

#intro{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
}

#cover{
max-width:95vw;
max-height:85vh;
object-fit:contain;
border-radius:10px;
}

/* BOTON ABRIR */

#openBtn{
margin-top:25px;
padding:14px 32px;
border-radius:40px;
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
backdrop-filter:blur(10px);
color:white;
font-size:18px;
cursor:pointer;
}

/* LIBRO */

#book{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
}

/* PAGINAS */

.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:url("fondo.jpg") center/cover no-repeat;
opacity:0;
transition:opacity .5s;
}

.page.active{
opacity:1;
}

/* CONTENIDO */

.content{
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:12px;
color:white;
text-align:center;
max-width:80%;
}

/* CONTROLES */

.controls{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 25px;
box-sizing:border-box;
}

.btn{
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
backdrop-filter:blur(10px);
color:white;
font-size:24px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#backCover{
position:absolute;
top:20px;
left:20px;
padding:10px 18px;
border-radius:25px;
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="musicBtn">🔇</div>

<div id="intro">

<img id="cover" src="carta.jpg">

<button id="openBtn">Abrir carta</button>

</div>

<div id="book">

<button id="backCover">Portada</button>

<div class="page active">

<div class="content">

<h2>Para ti</h2>

<p>Hoy quiero recordarte lo especial que eres.</p>

</div>

</div>

<div class="page">

<div class="content">

<h2>Tu sonrisa</h2>

<p>Tu sonrisa ilumina cada momento.</p>

</div>

</div>

<div class="page">

<div class="content">

<h2>Feliz día</h2>

<p>Feliz día de la mujer mi Giu 💛</p>

</div>

</div>

<div class="controls">

<div class="btn" id="prevBtn">❮</div>
<div class="btn" id="nextBtn">❯</div>

</div>

</div>

<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

const intro = document.getElementById("intro")
const book = document.getElementById("book")
const pages = document.querySelectorAll(".page")

let page = 0

function showPage(){

pages.forEach(p=>p.classList.remove("active"))
pages[page].classList.add("active")

}

document.getElementById("openBtn").onclick = () => {

intro.style.display="none"
book.style.display="flex"

}

document.getElementById("backCover").onclick = () => {

book.style.display="none"
intro.style.display="flex"

}

/* BOTONES PAGINA */

document.getElementById("nextBtn").onclick = () => {

if(page < pages.length-1){
page++
showPage()
}

}

document.getElementById("prevBtn").onclick = () => {

if(page>0){
page--
showPage()
}

}

/* SWIPE MOVIL */

let startX = 0

document.addEventListener("touchstart", e=>{
startX = e.touches[0].clientX
})

document.addEventListener("touchend", e=>{

let endX = e.changedTouches[0].clientX

if(startX-endX>50) document.getElementById("nextBtn").click()
if(endX-startX>50) document.getElementById("prevBtn").click()

})

/* MUSICA */

const music = document.getElementById("music")
const musicBtn = document.getElementById("musicBtn")

let playing = false

musicBtn.onclick = () => {

if(!playing){

music.play().then(()=>{

playing = true
musicBtn.innerHTML = "🔊"

})

}else{

music.pause()
playing = false
musicBtn.innerHTML = "🔇"

}

}

</script>

</body>
</html>
