<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carta</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:black;
overflow:hidden;
height:100vh;
perspective:2000px;
}

/* BOTON MUSICA */

#musicBtn{
position:fixed;
top:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
color:white;
cursor:pointer;
z-index:20;
}

/* PORTADA */

#intro{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:black;
}

#cover{
max-width:90vw;
max-height:80vh;
object-fit:contain;
}

#openBtn{
margin-top:20px;
padding:14px 30px;
border-radius:30px;
border:none;
background:rgba(255,255,255,0.2);
color:white;
font-size:18px;
cursor:pointer;
}

/* LIBRO */

#book{
position:absolute;
inset:0;
display:none;
align-items:center;
justify-content:center;
}

/* PAGINAS */

.page{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:url("fondo.jpg") center/cover no-repeat;
transform-origin:left;
transform:rotateY(90deg);
transition:transform .7s ease;
}

.page.active{
transform:rotateY(0deg);
}

.page.prev{
transform:rotateY(-90deg);
}

.content{
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:12px;
color:white;
text-align:center;
max-width:80%;
}

/* CONTROLES */

.controls{
position:absolute;
bottom:30px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 30px;
box-sizing:border-box;
}

.btn{
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:white;
cursor:pointer;
}

/* BOTON PORTADA */

#backCover{
position:absolute;
top:20px;
left:20px;
padding:10px 20px;
border-radius:25px;
background:rgba(255,255,255,0.2);
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="musicBtn">🔇</div>

<div id="intro">

<img id="cover" src="carta.jpg">

<button id="openBtn">Abrir carta</button>

</div>

<div id="book">

<div id="backCover">Portada</div>

<!-- PAGINAS -->

<div class="page active">
<div class="content">
<h2>Para ti</h2>
<p>Hoy quiero recordarte lo especial que eres.</p>
</div>
</div>

<div class="page">
<div class="content">
<h2>Tu sonrisa</h2>
<p>Tu sonrisa ilumina cada momento.</p>
</div>
</div>

<div class="page">
<div class="content">
<h2>Tu esencia</h2>
<p>Tienes una forma única de hacer que todo sea mejor.</p>
</div>
</div>

<div class="page">
<div class="content">
<h2>Admiración</h2>
<p>Admiro tu fuerza, tu inteligencia y tu corazón.</p>
</div>
</div>

<div class="page">
<div class="content">
<h2>Feliz día</h2>
<p>Feliz día de la mujer mi Giu 💛</p>
</div>
</div>

<div class="controls">

<div class="btn" id="prevBtn">❮</div>
<div class="btn" id="nextBtn">❯</div>

</div>

</div>

<audio id="music" loop playsinline webkit-playsinline>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

const intro=document.getElementById("intro")
const book=document.getElementById("book")
const pages=document.querySelectorAll(".page")

const nextBtn=document.getElementById("nextBtn")
const prevBtn=document.getElementById("prevBtn")
const backCover=document.getElementById("backCover")
const openBtn=document.getElementById("openBtn")

let current=0

function updatePages(){

pages.forEach((p,i)=>{

p.classList.remove("active","prev")

if(i===current){
p.classList.add("active")
}

if(i<current){
p.classList.add("prev")
}

})

}

/* ABRIR LIBRO */

openBtn.addEventListener("click",()=>{

intro.style.display="none"
book.style.display="flex"

})

/* VOLVER PORTADA */

backCover.addEventListener("click",()=>{

book.style.display="none"
intro.style.display="flex"
current=0
updatePages()

})

/* SIGUIENTE */

nextBtn.addEventListener("click",()=>{

if(current < pages.length-1){
current++
updatePages()
}

})

/* ANTERIOR */

prevBtn.addEventListener("click",()=>{

if(current > 0){
current--
updatePages()
}

})

/* SWIPE MOVIL */

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50) nextBtn.click()
if(endX-startX>50) prevBtn.click()

})

/* MUSICA */

const music=document.getElementById("music")
const musicBtn=document.getElementById("musicBtn")

let playing=false

musicBtn.addEventListener("click",()=>{

if(!playing){

music.play().then(()=>{
playing=true
musicBtn.innerHTML="🔊"
})

}else{

music.pause()
playing=false
musicBtn.innerHTML="🔇"

}

})

</script>

</body>
</html>
